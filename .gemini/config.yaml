# If these fields differ from the current Gemini Code Assist product schema,
# adjust them to match the official documentation while keeping the same intent.

code_review:
  comment_severity_threshold: MEDIUM

ignore_patterns:
  - "node_modules/**"
  - "dist/**"
  - "build/**"
  - ".venv/**"
  - "__pycache__/**"
  - "coverage/**"
  - "*.min.js"
